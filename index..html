<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aishwarya ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(-45deg,#ff4d6d,#ff758f,#6a5af9,#00c9ff);
background-size:400% 400%;
animation:bg 12s infinite ease;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{

width:800px;
max-width:90%;
padding:50px;
border-radius:30px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
box-shadow:0 0 40px rgba(0,0,0,.3);
text-align:center;
color:white;
animation:up 1.5s;
position:relative;
overflow:hidden;

}

@keyframes up{

from{
opacity:0;
transform:translateY(80px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h1{

font-size:60px;
margin-bottom:15px;
text-shadow:0 0 20px white;

}

h2{

font-size:28px;
margin-bottom:20px;
font-weight:400;

}

p{

font-size:18px;
line-height:35px;
color:#f5f5f5;

}

button{

margin-top:35px;
padding:18px 45px;
border:none;
border-radius:50px;
font-size:20px;
font-weight:bold;
cursor:pointer;
background:white;
color:#ff4d6d;
transition:.4s;

}

button:hover{

transform:scale(1.1);
box-shadow:0 0 25px white;

}

#msg{

margin-top:35px;
font-size:28px;
font-weight:bold;
display:none;
animation:fade 1s;

}

@keyframes fade{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

.circle{

position:absolute;
border-radius:50%;
background:rgba(255,255,255,.1);
animation:move 20s linear infinite;

}

.circle:nth-child(1){

width:150px;
height:150px;
top:-40px;
left:-40px;

}

.circle:nth-child(2){

width:120px;
height:120px;
bottom:-20px;
right:-20px;

}

@keyframes move{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

canvas{
position:absolute;
top:0;
left:0;
pointer-events:none;
}

</style>

</head>
<body>

<canvas id="canvas"></canvas>

<div class="card">

<div class="circle"></div>
<div class="circle"></div>

<h1>Aishwarya ✨</h1>

<h2>You are an Amazing Friend ❤️</h2>

<p>

Every friendship becomes special because of the person in it.<br><br>

Thank you for being kind, supportive, funny, and always spreading happiness.<br><br>

Keep smiling because your smile makes the world a little brighter. 🌸

</p>

<button onclick="showMessage()">
Click Here
</button>

<div id="msg">
🌸 You're Truly Awesome, Aishwarya! 🌸
</div>

</div>

<script>

function showMessage(){

document.getElementById("msg").style.display="block";

createHearts();

}

function createHearts(){

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML="💖";

heart.style.position="absolute";
heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=window.innerHeight+"px";
heart.style.fontSize=(20+Math.random()*30)+"px";
heart.style.animation="fly 5s linear forwards";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

}

const style=document.createElement("style");

style.innerHTML=`

@keyframes fly{

0%{

transform:translateY(0) rotate(0deg);
opacity:1;

}

100%{

transform:translateY(-900px) rotate(720deg);
opacity:0;

}

}

`;

document.head.appendChild(style);

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<180;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();

ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

ctx.fill();

s.y+=0.4;

if(s.y>canvas.height){

s.y=0;

}

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
